services:
  - type: web
    name: printsupport-backend
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run db:seed && node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: printsupport-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://printsupport.vercel.app
      - key: NODE_ENV
        value: production

databases:
  - name: printsupport-db
    databaseName: printsupport
    region: oregon
    plan: free
